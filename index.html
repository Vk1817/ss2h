  <style>  
   * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui, -apple-system, sans-serif;  
    }  
    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  
    video {  
      width: 100%;  
      height: 100%;  
      background: #000;  
      object-fit: contain;  
    }  
    .shaka-spinner-container,  
    .shaka-spinner,  
    .shaka-spinner-svg {  
      display: none !important;  
      visibility: hidden !important;  
      opacity: 0 !important;  
    }
    /* CRICKCAST Watermark */
    .watermark {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 100;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 4px;
      padding: 3px 8px 3px 6px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .watermark-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00e5ff;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .watermark-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>

  <script>  
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  
  
      if (!shaka.Player.isBrowserSupported()) {  
        console.error('Browser not supported');  
        return;  
      }  
  
      const video = document.querySelector('video');  
      const player = new shaka.Player();  
      await player.attach(video);  
  
      const container = document.querySelector('.shaka-video-container');  
      const ui = new shaka.ui.Overlay(player, container, video);  
  
      ui.configure({  
        controlPanelElements: [  
          'play_pause', 'time_and_duration', 'mute', 'volume',  
          'spacer', 'language', 'captions', 'picture_in_picture',  
          'quality', 'fullscreen'  
        ],  
        volumeBarColors: {  
          base: 'rgba(0, 136, 255, 0.3)',  
          level: 'rgb(0, 136, 255)'  
        },  
        seekBarColors: {  
          base: 'rgba(0, 136, 255, 0.3)',  
          buffered: 'rgba(0, 136, 255, 0.6)',  
          played: 'rgb(0, 136, 255)'  
        }
      });  
  
      let drmConfig = {  
        clearKeys: {  
          "b1fe42809099f51610bb94ce2c6fd99d": "3f39a299f97643de32d8b76c8adcbe08"  
        }  
      };  
  
      let streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/ewa8knrnhy/out/v1/86b617c4bd814ff88f7ccb2d88914ac6/cenc.mpd";  
  
      player.configure({  
        drm: drmConfig,  
        streaming: {  
          lowLatencyMode: true,  
          bufferingGoal: 15,  
          rebufferingGoal: 2,  
          bufferBehind: 15,  
          retryParameters: {  
            timeout: 10000,  
            maxAttempts: 5,  
            baseDelay: 300,  
            backoffFactor: 1.2  
          },  
          segmentRequestTimeout: 8000,  
          segmentPrefetchLimit: 2,  
          useNativeHlsOnSafari: true  
        },  
        manifest: {  
          retryParameters: {  
            timeout: 8000,  
            maxAttempts: 3  
          }  
        }  
      });  
  
      player.addEventListener('error', (event) => {  
        console.error('Shaka Player Error:', event.detail);  
      });  
  
      try {  
        await player.load(streamUrl);  
        console.log("Stream loaded successfully");  
      } catch (error) {  
        console.error('Load error:', error);  
      }  
    });  
  </script>
