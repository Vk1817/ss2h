    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .shaka-video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }
        .shaka-spinner-container,
        .shaka-spinner,
        .shaka-spinner-svg {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
        /* CRICKCAST Watermark */
        .watermark {
            position: absolute;
            top: 14px;
            right: 16px;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 4px;
            padding: 3px 8px 3px 6px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .watermark-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00e5ff;
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        .watermark-text {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #00e5ff;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported');
                return;
            }

            const video = document.querySelector('video');
            const player = new shaka.Player();
            await player.attach(video);

            const container = document.querySelector('.shaka-video-container');
            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({
                controlPanelElements: [
                    'play_pause', 'time_and_duration', 'mute', 'volume',
                    'spacer', 'language', 'captions', 'picture_in_picture',
                    'quality', 'fullscreen'
                ],
                volumeBarColors: { base: 'purple', level: 'purple' },
                seekBarColors: { base: 'white', buffered: 'red', played: 'blue' }
            });

            let streamUrl = "https://jiotvmblive.cdn.jio.com/bpk-tv/Ten_HD_MOB/WDVLive/index.mpd?__hdnea__=st=1781152457~exp=1781174057~acl=/*~hmac=76667c31d78c59f410abd028eb41de07928b1817a18e72d5957fb4104355fb3f";
            let drmConfig = {
                clearKeys: {
                    "3525c924e54154b39533d86b1c7a428a": "8548b566fc6608a7d3bd601ee5f3d889"
                }
            };

            let cookieHeader = "__hdnea__=st=1781152457~exp=1781174057~acl=/*~hmac=76667c31d78c59f410abd028eb41de07928b1817a18e72d5957fb4104355fb3f";

            player.configure({
                drm: drmConfig,
                streaming: {
                    lowLatencyMode: true,
                    bufferingGoal: 15,
                    rebufferingGoal: 2,
                    bufferBehind: 15,
                    retryParameters: {
                        timeout: 10000,
                        maxAttempts: 5,
                        baseDelay: 300,
                        backoffFactor: 1.2
                    }
                }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                request.headers['Cookie'] = cookieHeader;

                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
                    request.uris[0] && !request.uris[0].includes('__hdnea=')) {
                    const separator = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += separator + cookieHeader;
                }
            });

            const attemptAutoplay = async () => {
                try {
                    video.muted = false;
                    await video.play();
                } catch (error) {
                    video.muted = true;
                    await video.play();
                }
            };

            player.addEventListener('error', (event) => console.error('Shaka Player Error:', event.detail));

            try {
                await player.load(streamUrl);
                if (video.readyState >= 3) {
                    await attemptAutoplay();
                } else {
                    video.addEventListener('canplay', attemptAutoplay, { once: true });
                }
            } catch (error) {
                console.error('Load error:', error);
            }

            // Unmute on first interaction
            ['click', 'touchstart'].forEach(event => {
                document.addEventListener(event, () => { if(video.muted) video.muted = false; }, { once: true });
            });
        });
    </script>
